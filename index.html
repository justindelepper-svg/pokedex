<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokédex</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="images/pokeball.png">
</head>
<body>
    <div class="background">
        <div class="pokeball-wrapper">
            <img src="images/pokeball.png" alt="Pokéball" class="pokeball">
        </div>
        <img class="pokemon-art">
    </div>
    <div class="header">
        <!-- <div class="search"> -->
            <!-- <input type="text" id="search-input" placeholder="Search..." class="search-bar"> -->
            <!-- <button id="search-button" class="search-button"><i class="fa-solid fa-magnifying-glass"></i></button> -->
        <!-- </div> -->
    </div>
    <div class="pokedex-container">
        <div class="select" id="response-container">
            <div id="load-trigger"></div>
        </div>
    </div>
    <div class="detail-container">
        <div class="detail-top">
            <button class="back-btn">← Back</button>
            <div class="nav-buttons">
                <button class="prev-btn">← Previous</button>
                <button class="next-btn">Next →</button>
            </div>
        </div>
        <div class="detail-content">
            <div class="detail-left">
                <img class="pokemon-sprite">
            </div>
            <div class="detail-right">
                <h1 id="pokemon-name"></h1>
                <div class="types"></div>
                <div class="section">
                    <h3>Abilities</h3>
                    <ul class="abilities">

                    </ul>
                </div>
                <div class="section">
                    <h3>Base Stats</h3>
                    <div class="stats">
                        <div class="stat">
                            <span>HP</span>
                            <div class="bar"><div id="hpBar"></div></div>
                            <span class="stat-value">35</span>
                        </div>
                        <div class="stat">
                            <span>Attack</span>
                            <div class="bar"><div id="atkBar"></div></div>
                            <span class="stat-value">55</span>
                        </div>
                        <div class="stat">
                            <span>Defense</span>
                            <div class="bar"><div id="defBar"></div></div>
                            <span class="stat-value">40</span>
                        </div>
                        <div class="stat">
                            <span>Sp. Atk</span>
                            <div class="bar"><div id="spaBar"></div></div>
                            <span class="stat-value">50</span>
                        </div>
                        <div class="stat">
                            <span>Sp. Def</span>
                            <div class="bar"><div id="spdBar"></div></div>
                            <span class="stat-value">50</span>
                        </div>
                        <div class="stat">
                            <span>Speed</span>
                            <div class="bar"><div id="speBar"></div></div>
                            <span class="stat-value">90</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
